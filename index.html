<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Alchemy | Redefine Your Reality</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Background Elements -->
        <div class="energy-field"></div>
        <div class="glow-orb" id="orb-1"></div>
        <div class="glow-orb" id="orb-2"></div>

        <nav class="glass-nav">
            <div class="logo">IDENTITY<span>ALCHEMY</span></div>
            <div class="mic-health-container">
                <div class="neural-waveform" id="mic-waveform">
                    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                </div>
                <div id="mic-status-dot"></div>
                <span id="mic-status-text">Microphone Idle</span>
            </div>
            <div class="nav-links">
                <button class="nav-btn" data-view="discovery">Blueprint</button>
                <button class="nav-btn" data-view="recoding">Lab</button>
                <button class="nav-btn" data-view="laboratory">Laboratory</button>
                <button class="nav-btn" data-view="dojo">Dojo</button>
            </div>
        </nav>

        <main id="main-content">
            <!-- Dynamic Content Injected Here -->
            <section id="welcome-view" class="view active">
                <div class="hero">
                    <h1 class="reveal-text">Kill the version of you that can't survive success.</h1>
                    <p class="subtitle fade-in">A scientifically-grounded, metaphysical process to radical identity shifting.</p>
                    <button class="cta-btn pulse" id="start-journey">Begin Transformation</button>
                </div>
            </section>
        </main>

        <footer class="glass-footer">
            <div class="status-bar">
                <span id="current-state">Current State: Presence</span>
                <div class="progress-container">
                    <div class="progress-bar" id="app-progress"></div>
                </div>
            </div>
        <div class="focus-overlay" id="focus-overlay">
            <div class="neural-orb" id="neural-orb"></div>
            <div class="focus-label" id="focus-label">Listening...</div>
            <button class="stop-focus-btn" id="stop-focus-btn">Stop & Reveal</button>
        </div>

    </div>
    <script src="demoData.js?v=5.0"></script>
    <script src="app.js?v=19.2"></script>
</body>
</html>
